name: PR verify

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 24.x

jobs:
  generate-resources:
    name: Generate resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate backend client
        working-directory: ui
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -g typescript-axios \
            -i https://api.apps.rancher.io/api-docs \
            -o autogenerated/client/backend \
            --additional-properties usePromises=true \
            --model-name-suffix=DTO

      - name: Save UI autogenerated resources
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ui-autogenerated
          path: ui/autogenerated/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run markdownlint
        run: npx markdownlint-cli -c ./markdownlint.yml --ignore ui/node_modules --ignore ui/autogenerated  --ignore backend/node_modules "**/*.md"

  verify-ui:
    name: Verify UI
    runs-on: ubuntu-latest
    needs: generate-resources
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check if UI files changed
        id: ui-changes
        run: |
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep '^ui/'; then
            echo "changes=true" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_ENV
          fi

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: env.changes == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Download results from generate-resources job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c80934
        with:
          name: ui-autogenerated
          path: ui/autogenerated

      - name: Install dependencies
        if: env.changes == 'true'
        working-directory: ui
        run: npm ci

      - name: Build UI
        if: env.changes == 'true'
        working-directory: ui
        run: npm run build
  
  verify-backend:
    name: Verify backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check if backend files changed
        id: backend-changes
        run: |
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep '^backend/'; then
            echo "changes=true" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_ENV
          fi

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: env.changes == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        if: env.changes == 'true'
        run: npm ci

      - name: Lint backend
        working-directory: backend
        if: env.changes == 'true'
        run: npm run lint

  verify-docker:
    name: Verify docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check if docker files changed
        id: dockerfiles-changes
        run: |
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep -E '^(Dockerfile|docker-compose\.yaml|\.dockerignore)$'; then
            echo "changes=true" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_ENV
          fi

      - name: Login to Application Collection
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        if: env.changes == 'true'
        with:
          registry: dp.apps.rancher.io
          username: ${{ secrets.APPCO_SA_USERNAME }}
          password: ${{ secrets.APPCO_SA_PASSWORD }}

      # Ref: https://docs.docker.com/build/ci/github-actions/multi-platform/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        if: env.changes == 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        if: env.changes == 'true'

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        if: env.changes == 'true'
        with:
          platforms: linux/amd64,linux/arm64
          push: false
          tags: rancher/application-collection-extension:latest